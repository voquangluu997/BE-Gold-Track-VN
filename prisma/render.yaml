# render.yaml
services:
  - type: web
    name: goldtrack-backend
    runtime: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: goldtrack-db
          property: connectionString
      # Redis Configuration
      - key: REDIS_HOST
        value: xxxxx.upstash.io
      - key: REDIS_PORT
        value: 6379
      - key: REDIS_PASSWORD
        value: your_password
      - key: REDIS_TLS
        value: 1
      - key: JWT_SECRET
        generateValue: true